version: '3.8'

services:
  llm-dns:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-over-dns

    # Use host networking so the container shares the host's network namespace.
    # This avoids Podman/CNI port-binding issues with privileged ports.
    # iptables redirects host UDP 53 -> 5353 (see deploy note below).
    network_mode: host

    # Environment variables configuration
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-nvidia/nemotron-nano-12b-v2-vl:free}
      ANYROUTER_API_KEY: ${ANYROUTER_API_KEY:-}
      ANYROUTER_MODEL: ${ANYROUTER_MODEL:-}
      CACHE_TTL_SEC: ${CACHE_TTL_SEC:-300}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-5.0}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-10.0}

      # DNS Server listens on 5353 (non-privileged).
      # Host iptables routes UDP :53 -> :5353.
      DNS_ADDRESS: ${DNS_ADDRESS:-0.0.0.0}
      DNS_PORT: ${DNS_PORT:-5353}

      # Logging level (trace, debug, info, warn, error)
      RUST_LOG: ${RUST_LOG:-info}

    # Restart policy
    restart: unless-stopped

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
